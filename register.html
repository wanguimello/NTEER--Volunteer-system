<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Volunteer with NTeer</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--color-gray-100);
            padding: 2rem;
        }

        .auth-card {
            background-color: var(--color-white);
            padding: 3rem;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--color-gray-200);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header i {
            font-size: 3rem;
            color: var(--color-black);
            margin-bottom: 1rem;
        }

        .auth-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--color-gray-500);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--color-gray-200);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
            background-color: var(--color-white);
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--color-black);
            box-shadow: 0 0 0 3px rgba(10, 10, 10, 0.1);
        }

        .auth-btn {
            width: 100%;
            margin-top: 1.5rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--color-gray-500);
        }

        .auth-footer a {
            color: var(--color-black);
            font-weight: 600;
            text-decoration: underline;
        }

        #register-error {
            color: var(--color-red);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html"><i class="ph ph-hand-heart"></i></a>
                <h1>Create an Account</h1>
                <p>Join NTeer and start making a difference.</p>
            </div>

            <form id="register-form">
                <div id="register-error">Username already exists. Please choose another.</div>

                <div class="form-group">
                    <label class="form-label" for="fullname">Full Name</label>
                    <input type="text" id="fullname" class="form-input" required placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" class="form-input" required placeholder="Choose a username">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" required
                        placeholder="Create a strong password">
                </div>

                <div class="form-group">
                    <label class="form-label" for="role">I am a...</label>
                    <select id="role" class="form-select" required>
                        <option value="volunteer" selected>Volunteer (Looking for sites)</option>
                        <option value="supervisor">Site Supervisor (Managing a site)</option>
                    </select>
                </div>

                <button type="submit" class="btn-solid auth-btn">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Log in here</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Check if role is passed via URL query parameter
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const role = urlParams.get('role');
            if (role === 'volunteer' || role === 'supervisor') {
                document.getElementById('role').value = role;
            }
        });
    </script>
</body>

</html>
